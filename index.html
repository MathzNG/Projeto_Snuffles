<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alimentador Automático</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<img src="imagem/Snuffles.png" class="logo">

<div class="container">
  <div class="glass">

    <h2>Configurar Horários</h2>

    <form id="formHorarios">
      <label>Horário 1</label>
      <input type="time" id="h1">

      <label>Horário 2</label>
      <input type="time" id="h2">

      <label>Horário 3</label>
      <input type="time" id="h3">

      <button type="submit">Salvar</button>
    </form>

    <h3>Horários salvos:</h3>
    <ul>
      <li id="show1">--:--</li>
      <li id="show2">--:--</li>
      <li id="show3">--:--</li>
    </ul>

    <button class="liberar" onclick="liberar()">Liberar Agora</button>

  </div>
</div>

<div id="toast">🐶 Ração liberada!</div>

<script src="script.js"></script>
</body>
</html>
